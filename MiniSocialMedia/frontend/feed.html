<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MiniSocial Feed — Browse posts, share your thoughts, like and comment.">
  <meta name="theme-color" content="#6c5ce7">
  <title>MiniSocial — Feed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">M</span>MiniSocial
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="feed.html" class="active">Feed</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="#" id="nav-login" class="nav-btn" style="display:none;">Sign In</a></li>
      <li><a href="#" id="nav-logout" class="nav-btn" onclick="event.preventDefault(); logout()">Logout</a></li>
    </ul>
  </nav>

  <!-- Feed Content -->
  <div class="container-narrow">

    <!-- Feed Header -->
    <div class="feed-header">
      <h2>📰 Your Feed</h2>
      <p id="feed-greeting">What's on your mind?</p>
    </div>

    <!-- Create Post Card -->
    <div class="create-post-card">
      <h3>✍️ Create a Post</h3>
      <form id="create-post-form" enctype="multipart/form-data">
        <textarea class="form-input" id="post-content" rows="3" placeholder="Share something with the community..." maxlength="1000"></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-md);">
          <input type="file" id="post-media" accept="image/*,video/*" style="font-size: 0.85rem;" />
        </div>
        <button type="submit" class="btn btn-primary">Publish</button>
      </form>
    </div>

    <!-- Posts List -->
    <div id="posts-list">
      <!-- Posts loaded dynamically by JS -->
    </div>

  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initFeedPage);
  </script>
</body>
</html>
