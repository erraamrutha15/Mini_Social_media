<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MiniSocial Profile — View your profile, manage your posts, and discover people.">
  <meta name="theme-color" content="#6c5ce7">
  <title>MiniSocial — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">M</span>MiniSocial
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="feed.html">Feed</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
      <li><a href="#" id="nav-login" class="nav-btn" style="display:none;">Sign In</a></li>
      <li><a href="#" id="nav-logout" class="nav-btn" onclick="event.preventDefault(); logout()">Logout</a></li>
    </ul>
  </nav>

  <!-- Profile Content -->
  <div class="container">
    <div class="layout-two-col">

      <!-- Main Content (Profile + Posts) -->
      <div id="profile-content">
        <!-- Profile and posts loaded dynamically by JS -->
      </div>

      <!-- Sidebar — Discover People -->
      <div class="sidebar">
        <div class="sidebar-card">
          <h3>👥 Discover People</h3>
          <div id="users-list">
            <!-- Users loaded dynamically by JS -->
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initProfilePage);
  </script>
</body>
</html>
