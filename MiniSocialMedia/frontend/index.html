<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MiniSocial — A modern micro social media platform. Connect, share, and engage with your community.">
  <meta name="keywords" content="social media, mini social, connect, share, posts">
  <meta name="author" content="MiniSocial">
  <meta name="theme-color" content="#6c5ce7">
  <title>My MiniSocial — Connect & Share</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <span class="brand-icon">M</span>MiniSocial
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="feed.html" class="nav-auth-link disabled">Feed</a></li>
      <li><a href="profile.html" class="nav-auth-link disabled">Profile</a></li>
      <li><a href="#" id="nav-login" class="nav-btn" onclick="event.preventDefault(); document.getElementById('auth-section').scrollIntoView({behavior:'smooth'})">Sign In</a></li>
      <li><a href="#" id="nav-logout" class="nav-btn" style="display:none;" onclick="event.preventDefault(); logout()">Logout</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <span class="hero-emoji">🌐</span>
      <h1>Your Social Universe Awaits</h1>
      <p>Create, share, and connect with a vibrant community. Post your thoughts, follow friends, and discover amazing conversations.</p>
    </div>
  </section>

  <!-- Auth Section -->
  <section class="auth-section" id="auth-section">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Create Account</button>
    </div>
    <div class="auth-card">
      <!-- Login Form -->
      <form class="auth-form active" id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input type="text" class="form-input" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="reg-first-name">First Name</label>
            <input type="text" class="form-input" id="reg-first-name" placeholder="John">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-last-name">Last Name</label>
            <input type="text" class="form-input" id="reg-last-name" placeholder="Doe">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input type="text" class="form-input" id="reg-username" placeholder="Choose a username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-input" id="reg-email" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input type="password" class="form-input" id="reg-password" placeholder="Min 8 characters" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
    </div>
  </section>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initHomePage);
  </script>
</body>
</html>
